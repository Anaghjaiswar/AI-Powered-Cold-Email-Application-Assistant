version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: email_agent_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: email_agent_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - ./frontend:/app/static
    networks:
      - agent_network

volumes:
  postgres_data:

networks:
  agent_network:
    driver: bridge